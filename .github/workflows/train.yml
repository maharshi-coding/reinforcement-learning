name: Train Models

on:
  # Manual trigger with configurable parameters
  workflow_dispatch:
    inputs:
      algorithm:
        description: "Algorithm to train (leave empty for all)"
        required: false
        type: choice
        options:
          - ""
          - dqn
          - ppo
          - a2c
      timesteps:
        description: "Training timesteps"
        required: false
        default: "500000"
      curriculum:
        description: "Use curriculum training"
        required: false
        type: boolean
        default: false

  # Auto-train weekly on Sunday midnight UTC
  schedule:
    - cron: "0 0 * * 0"

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Restore previously trained models (if any)
      - name: Download existing models
        uses: actions/cache@v4
        with:
          path: models/
          key: airs-models-${{ github.sha }}
          restore-keys: airs-models-

      - name: Train
        run: |
          ARGS="--config configs/default.yaml --timesteps ${{ inputs.timesteps || '500000' }}"
          if [ -n "${{ inputs.algorithm }}" ]; then
            ARGS="$ARGS --algorithm ${{ inputs.algorithm }}"
          fi
          if [ "${{ inputs.curriculum }}" = "true" ]; then
            ARGS="$ARGS --curriculum"
          fi
          python scripts/train_universal.py $ARGS

      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models-${{ github.run_number }}
          path: models/
          retention-days: 30

      - name: Upload training curves
        uses: actions/upload-artifact@v4
        with:
          name: training-results-${{ github.run_number }}
          path: results/learning_curve_*
          retention-days: 30

      # Cache models for downstream evaluate workflow
      - name: Cache models
        uses: actions/cache/save@v4
        with:
          path: models/
          key: airs-models-${{ github.sha }}
