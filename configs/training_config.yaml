# AIRS – Training Configuration
# Usage: python src/training/train_agent.py --config configs/training_config.yaml

seed: 42

environment:
  attack_mode: brute_force        # brute_force | flood | adaptive | multi_stage
  intensity: medium               # low | medium | high
  max_steps: 200
  use_real_system_metrics: false
  noisy_observations: false
  noise_std: 0.05
  partial_observability: false
  mask_probability: 0.1
  action_cooldown: 0
  delayed_effect_steps: 0
  resource_budget: null
  temporal_window: 1

agent:
  algorithm: dqn                  # dqn | ppo
  policy: MlpPolicy
  dqn:
    learning_rate: 1.0e-3
    buffer_size: 50000
    learning_starts: 500
    batch_size: 64
    tau: 1.0
    gamma: 0.99
    train_freq: 4
    gradient_steps: 1
    target_update_interval: 500
    exploration_fraction: 0.3
    exploration_final_eps: 0.05
  ppo:
    learning_rate: 3.0e-4
    n_steps: 512
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2

training:
  total_timesteps: 50000
  n_envs: 1
  eval_freq: 5000
  eval_episodes: 10
  checkpoint_best: true
  early_stopping_patience: 5
  curriculum:
    enabled: false
    stages:
      - {intensity: low,    timesteps: 15000}
      - {intensity: medium, timesteps: 20000}
      - {intensity: high,   timesteps: 15000}

evaluation:
  episodes: 50
  n_seeds: 5
  baselines:
    - always_noop
    - random_policy
    - rule_based_threshold
  metrics:
    - mean_reward
    - detection_delay
    - false_positive_rate
    - service_downtime
    - cost_per_episode
    - attack_success_rate
  ood_tests:
    - bursty_traffic
    - noisy_telemetry
    - unseen_attack_combo

reward:
  threat_weight: 10.0
  service_cost_weight: 5.0
  false_positive_weight: 3.0
  ineffective_weight: 5.0
  survival_bonus: 0.1
  response_latency_penalty: 0.0
  downtime_threshold: 0.5
  downtime_penalty: 2.0

paths:
  model_dir: models
  results_dir: results
  log_dir: logs
  mlflow_uri: experiments/training_runs
