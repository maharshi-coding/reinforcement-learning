# AIRS – Default Configuration
# Override any section via CLI or experiment-specific YAML files.

seed: 42

environment:
  attack_mode: brute_force        # brute_force | flood | adaptive | multi_stage
  intensity: medium               # low | medium | high
  max_steps: 200
  use_real_system_metrics: false
  # --- new realism knobs ---
  noisy_observations: false       # add Gaussian sensor noise
  noise_std: 0.05
  partial_observability: false    # randomly mask some features
  mask_probability: 0.1
  action_cooldown: 0              # min steps between non-noop actions
  delayed_effect_steps: 0         # action effect delay (0 = immediate)
  resource_budget: null            # null = unlimited; int = max non-noop actions per episode
  temporal_window: 1              # number of past timesteps stacked in obs (1 = current only)

agent:
  algorithm: dqn                  # dqn | ppo | a2c | recurrent_ppo
  policy: MlpPolicy              # MlpPolicy | MlpLstmPolicy (recurrent_ppo uses MlpLstmPolicy)
  dqn:
    learning_rate: 5.0e-4         # slower for stability
    buffer_size: 100000           # larger replay buffer for diversity
    learning_starts: 1000         # more random exploration before learning
    batch_size: 128               # larger batches for stable gradients
    tau: 0.005                    # soft target update (Polyak averaging)
    gamma: 0.99
    train_freq: 4
    gradient_steps: 2             # more gradient steps per env step
    target_update_interval: 250   # more frequent target sync (with soft tau)
    exploration_fraction: 0.4     # explore longer across diverse scenarios
    exploration_final_eps: 0.03   # lower floor for better exploitation
  ppo:
    learning_rate: 2.5e-4
    n_steps: 1024                 # larger rollout buffer
    batch_size: 128
    n_epochs: 15                  # more epochs per update
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01                # entropy bonus for exploration
    vf_coef: 0.5                  # value function coefficient
    max_grad_norm: 0.5            # gradient clipping
  a2c:
    learning_rate: 7.0e-4
    n_steps: 256
    gamma: 0.99
    gae_lambda: 0.95
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    normalize_advantage: true
  recurrent_ppo:
    learning_rate: 2.5e-4
    n_steps: 1024
    batch_size: 128
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    lstm_hidden_size: 128
    n_lstm_layers: 1

stochastic_actions:
  enabled: true
  success_probabilities:
    block_ip: 0.90
    rate_limit: 0.80
    isolate_service: 0.85
  failure_residual: 0.10          # fraction of normal reduction on failure

self_play:
  enabled: false
  rounds: 10
  defender_steps: 20000
  attacker_steps: 20000

explainability:
  enabled: false
  method: perturbation            # perturbation | shap
  num_perturbations: 50

training:
  total_timesteps: 500000
  n_envs: 1                      # number of parallel envs (VecEnv)
  eval_freq: 5000                 # evaluate every N timesteps
  eval_episodes: 10
  checkpoint_best: true           # save best model by eval reward
  early_stopping_patience: 5     # stop after N evals without improvement
  curriculum:
    enabled: false
    stages:                       # progressive difficulty
      - {intensity: low,    timesteps: 15000}
      - {intensity: medium, timesteps: 20000}
      - {intensity: high,   timesteps: 15000}

evaluation:
  episodes: 50
  n_seeds: 5                     # multi-seed evaluation
  baselines:                     # baseline policies to compare against
    - always_noop
    - random_policy
    - rule_based_threshold
  metrics:
    - mean_reward
    - detection_delay
    - false_positive_rate
    - service_downtime
    - cost_per_episode
    - attack_success_rate
  ood_tests:
    - bursty_traffic
    - noisy_telemetry
    - unseen_attack_combo

reward:
  threat_weight: 10.0
  service_cost_weight: 5.0
  false_positive_weight: 3.0
  ineffective_weight: 5.0
  survival_bonus: 0.1
  response_latency_penalty: 0.0   # new: penalise delayed response
  downtime_threshold: 0.5         # new: penalty when cumulative cost exceeds this
  downtime_penalty: 2.0

paths:
  model_dir: models
  results_dir: results
  log_dir: logs
